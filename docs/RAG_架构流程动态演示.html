<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 架构流程动态演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 60px;
        }

        .section {
            position: relative;
            width: 100%;
            max-width: 900px;
            border-radius: 20px;
            padding: 40px;
            opacity: 0;
            transform: translateY(30px);
        }

        .section.visible {
            animation: fadeInUp 0.8s ease forwards;
        }

        .section-offline {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #2a4a7f;
            box-shadow: 0 0 40px rgba(42, 74, 127, 0.3);
        }

        .section-online {
            background: linear-gradient(135deg, #1a2e1a 0%, #162e21 100%);
            border: 1px solid #2a7f4a;
            box-shadow: 0 0 40px rgba(42, 127, 74, 0.3);
        }

        .section-title {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f0f1a;
            padding: 4px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .section-offline .section-title {
            color: #6cb4ee;
            border: 1px solid #2a4a7f;
        }

        .section-online .section-title {
            color: #6cee8a;
            border: 1px solid #2a7f4a;
        }

        .flow-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .flow-node {
            padding: 14px 22px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
            position: relative;
            white-space: nowrap;
        }

        .flow-node.active {
            animation: nodeAppear 0.5s ease forwards;
        }

        .flow-node:hover {
            transform: scale(1.08) !important;
            z-index: 10;
        }

        /* 离线阶段节点样式 */
        .node-source {
            background: linear-gradient(135deg, #2d1b69, #4a2c8a);
            color: #c4b5fd;
            border: 1px solid #6d4aaa;
            box-shadow: 0 4px 15px rgba(109, 74, 170, 0.3);
        }

        .node-chunk {
            background: linear-gradient(135deg, #1b4069, #2c5a8a);
            color: #93c5fd;
            border: 1px solid #4a7aaa;
            box-shadow: 0 4px 15px rgba(74, 122, 170, 0.3);
        }

        .node-embedding {
            background: linear-gradient(135deg, #1b6960, #2c8a7a);
            color: #86efac;
            border: 1px solid #4aaa8a;
            box-shadow: 0 4px 15px rgba(74, 170, 138, 0.3);
        }

        .node-vectordb {
            background: linear-gradient(135deg, #694a1b, #8a6a2c);
            color: #fde68a;
            border: 1px solid #aa8a4a;
            box-shadow: 0 4px 15px rgba(170, 138, 74, 0.3);
        }

        /* 在线阶段节点样式 */
        .node-query {
            background: linear-gradient(135deg, #1b6930, #2c8a4a);
            color: #86efac;
            border: 1px solid #4aaa6a;
            box-shadow: 0 4px 15px rgba(74, 170, 106, 0.3);
        }

        .node-search {
            background: linear-gradient(135deg, #1b5069, #2c708a);
            color: #7dd3fc;
            border: 1px solid #4a90aa;
            box-shadow: 0 4px 15px rgba(74, 144, 170, 0.3);
        }

        .node-topk {
            background: linear-gradient(135deg, #4a1b69, #6a2c8a);
            color: #d8b4fe;
            border: 1px solid #8a4aaa;
            box-shadow: 0 4px 15px rgba(138, 74, 170, 0.3);
        }

        .node-prompt {
            background: linear-gradient(135deg, #69501b, #8a702c);
            color: #fde68a;
            border: 1px solid #aa904a;
            box-shadow: 0 4px 15px rgba(170, 144, 74, 0.3);
        }

        .node-llm {
            background: linear-gradient(135deg, #691b3a, #8a2c5a);
            color: #fda4af;
            border: 1px solid #aa4a6a;
            box-shadow: 0 4px 15px rgba(170, 74, 106, 0.3);
        }

        /* 箭头 */
        .arrow {
            font-size: 20px;
            opacity: 0;
            color: #666;
        }

        .arrow.active {
            animation: arrowAppear 0.4s ease forwards;
        }

        .arrow-horizontal {
            color: #888;
        }

        .arrow-down {
            display: flex;
            justify-content: center;
            margin: 8px 0;
            font-size: 24px;
            color: #888;
        }

        /* 数据流动画 */
        .flow-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
        }

        .section-offline .flow-particle {
            background: #6cb4ee;
            box-shadow: 0 0 10px #6cb4ee;
        }

        .section-online .flow-particle {
            background: #6cee8a;
            box-shadow: 0 0 10px #6cee8a;
        }

        /* 脉冲动画 */
        .pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
        }

        .flow-node.active .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        .section-offline .pulse {
            border: 2px solid #6cb4ee;
        }

        .section-online .pulse {
            border: 2px solid #6cee8a;
        }

        /* 连接线 */
        .connector {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #6cb4ee, transparent);
            opacity: 0;
            animation: connectorFlow 2s linear infinite;
        }

        /* 重播按钮 */
        .replay-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #4a2c8a, #2c5a8a);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(74, 44, 138, 0.4);
            z-index: 100;
        }

        .replay-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(74, 44, 138, 0.6);
        }

        /* 动画定义 */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes nodeAppear {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes arrowAppear {
            0% {
                opacity: 0;
                transform: translateX(-5px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.3);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.3);
            }
        }

        @keyframes connectorFlow {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes dataFlow {
            0% {
                left: 0%;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                left: 100%;
                opacity: 0;
            }
        }

        /* 标题 */
        .page-title {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.2s forwards;
        }

        .page-subtitle {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin-top: 8px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.4s forwards;
        }

        /* 图标 */
        .node-icon {
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div>
        <h1 class="page-title">RAG 架构流程</h1>
        <p class="page-subtitle">Retrieval-Augmented Generation</p>
    </div>

    <!-- 离线索引阶段 -->
    <div class="section section-offline" id="offline-section">
        <span class="section-title">离线索引</span>
        <div class="flow-row" id="offline-flow">
            <div class="flow-node node-source" data-delay="0">
                <span class="pulse"></span>
                <span class="node-icon">📄</span>PDF / Word / 网页 / 代码
            </div>
            <span class="arrow arrow-horizontal" data-delay="400">→</span>
            <div class="flow-node node-chunk" data-delay="600">
                <span class="pulse"></span>
                <span class="node-icon">✂️</span>文本分块
            </div>
            <span class="arrow arrow-horizontal" data-delay="1000">→</span>
            <div class="flow-node node-embedding" data-delay="1200">
                <span class="pulse"></span>
                <span class="node-icon">🧮</span>Embedding 向量化
            </div>
            <span class="arrow arrow-horizontal" data-delay="1600">→</span>
            <div class="flow-node node-vectordb" data-delay="1800">
                <span class="pulse"></span>
                <span class="node-icon">🗄️</span>向量数据库
            </div>
        </div>
    </div>

    <!-- 在线查询阶段 -->
    <div class="section section-online" id="online-section">
        <span class="section-title">在线查询</span>

        <!-- 第一行 -->
        <div class="flow-row" id="online-flow-1">
            <div class="flow-node node-query" data-delay="0">
                <span class="pulse"></span>
                <span class="node-icon">💬</span>用户问题
            </div>
            <span class="arrow arrow-horizontal" data-delay="400">→</span>
            <div class="flow-node node-embedding" data-delay="600">
                <span class="pulse"></span>
                <span class="node-icon">🧮</span>Embedding
            </div>
            <span class="arrow arrow-horizontal" data-delay="1000">→</span>
            <div class="flow-node node-search" data-delay="1200">
                <span class="pulse"></span>
                <span class="node-icon">🔍</span>相似度检索
            </div>
            <span class="arrow arrow-horizontal" data-delay="1600">→</span>
            <div class="flow-node node-topk" data-delay="1800">
                <span class="pulse"></span>
                <span class="node-icon">📋</span>Top-K 文档片段
            </div>
        </div>

        <!-- 向下箭头 -->
        <div class="arrow-down arrow" data-delay="2200" id="online-arrow-1">↓</div>

        <!-- 第二行 -->
        <div class="flow-row" id="online-flow-2">
            <div class="flow-node node-prompt" data-delay="2400">
                <span class="pulse"></span>
                <span class="node-icon">📝</span>Prompt = 系统指令 + 检索结果 + 用户问题
            </div>
        </div>

        <!-- 向下箭头 -->
        <div class="arrow-down arrow" data-delay="2800" id="online-arrow-2">↓</div>

        <!-- 第三行 -->
        <div class="flow-row" id="online-flow-3">
            <div class="flow-node node-llm" data-delay="3000">
                <span class="pulse"></span>
                <span class="node-icon">🤖</span>LLM 生成回答
            </div>
        </div>
    </div>

    <button class="replay-btn" onclick="replay()">🔄 重播动画</button>

    <script>
        function animateSection(section, baseDelay) {
            // 显示 section 容器
            setTimeout(() => {
                section.classList.add('visible');
            }, baseDelay);

            // 动画化内部节点和箭头
            const nodes = section.querySelectorAll('.flow-node');
            const arrows = section.querySelectorAll('.arrow');

            nodes.forEach(node => {
                const delay = parseInt(node.dataset.delay) + baseDelay + 400;
                setTimeout(() => {
                    node.classList.add('active');
                }, delay);
            });

            arrows.forEach(arrow => {
                const delay = parseInt(arrow.dataset.delay) + baseDelay + 400;
                setTimeout(() => {
                    arrow.classList.add('active');
                }, delay);
            });
        }

        function startAnimation() {
            const offlineSection = document.getElementById('offline-section');
            const onlineSection = document.getElementById('online-section');

            animateSection(offlineSection, 500);
            animateSection(onlineSection, 3000);
        }

        function replay() {
            // 重置所有动画状态
            document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
            document.querySelectorAll('.flow-node').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.arrow').forEach(a => a.classList.remove('active'));

            // 重新开始
            setTimeout(startAnimation, 300);
        }

        // 页面加载后启动动画
        window.addEventListener('load', () => {
            setTimeout(startAnimation, 500);
        });
    </script>
</body>
</html>
