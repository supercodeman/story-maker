# server/config.yaml
server:
  port: 8080
  mode: debug

database:
  dsn: "root:password@tcp(127.0.0.1:3306)/ai_curton?charset=utf8mb4&parseTime=True&loc=Local"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0

jwt:
  secret: "change-me-to-a-random-string"
  access_token_ttl: 7200      # 2 小时
  refresh_token_ttl: 604800   # 7 天

encrypt:
  key: "change-me-32-byte-aes256-key!!"  # 必须 32 字节

upload:
  path: "./uploads"
  max_size: 20971520  # 20MB

kimi:
  api_key: ""
  base_url: "https://api.moonshot.cn/v1"

novel_search:
  web_search_model: "qwen"   # AI 联网搜索主力模型（qwen/zhipu/kimi），失败自动降级到其他模型
  ai_model: "zhipu"          # AI 离线兜底使用的模型名称
